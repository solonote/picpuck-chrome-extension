    </filter>
  </defs>
  <g transform="translate(6, 6) scale(1.2)">
    <path d="M10 10 L80 45 L10 80 Z" fill="none" stroke="url(#logoGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlow)" opacity="0.8" />
    <path d="M10 10 L80 45 L10 80 Z" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M10 25 L40 45 L10 65" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <path d="M50 15 L70 30" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <circle cx="20" cy="45" r="3.5" fill="#00DFFF" />
    <circle cx="25" cy="40" r="2" fill="#AF40FF" />
    <circle cx="30" cy="50" r="1.5" fill="#00DFFF" opacity="0.6" />
  </g>
</svg>
